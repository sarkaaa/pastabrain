<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Left rigatoni tube -->
  <rect x="8" y="14" width="46" height="92" rx="14" fill="#F59E0B"/>
  <!-- Top opening (hollow) -->
  <ellipse cx="31" cy="14" rx="23" ry="8" fill="#92400E" opacity="0.8"/>
  <!-- Ridges (horizontal lines across the tube) -->
  <line x1="8"  y1="28"  x2="54" y2="28"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="8"  y1="40"  x2="54" y2="40"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="8"  y1="52"  x2="54" y2="52"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="8"  y1="64"  x2="54" y2="64"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="8"  y1="76"  x2="54" y2="76"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="8"  y1="88"  x2="54" y2="88"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="8"  y1="100" x2="54" y2="100" stroke="#D97706" stroke-width="2.5"/>
  <!-- Bottom opening -->
  <ellipse cx="31" cy="106" rx="23" ry="8" fill="#D97706" opacity="0.5"/>
  <!-- Highlight -->
  <line x1="20" y1="14" x2="20" y2="106" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>

  <!-- Right rigatoni tube -->
  <rect x="66" y="14" width="46" height="92" rx="14" fill="#F59E0B"/>
  <!-- Top opening -->
  <ellipse cx="89" cy="14" rx="23" ry="8" fill="#92400E" opacity="0.8"/>
  <!-- Ridges -->
  <line x1="66"  y1="28"  x2="112" y2="28"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="66"  y1="40"  x2="112" y2="40"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="66"  y1="52"  x2="112" y2="52"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="66"  y1="64"  x2="112" y2="64"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="66"  y1="76"  x2="112" y2="76"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="66"  y1="88"  x2="112" y2="88"  stroke="#D97706" stroke-width="2.5"/>
  <line x1="66"  y1="100" x2="112" y2="100" stroke="#D97706" stroke-width="2.5"/>
  <!-- Bottom opening -->
  <ellipse cx="89" cy="106" rx="23" ry="8" fill="#D97706" opacity="0.5"/>
  <!-- Highlight -->
  <line x1="78" y1="14" x2="78" y2="106" stroke="white" stroke-width="2.5" stroke-linecap="round" opacity="0.25"/>
</svg>
