<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- 4 ravioli squares with filling bump and crimped edges -->

  <!-- Top-left -->
  <rect x="8"  y="8"  width="48" height="48" rx="6" fill="#F59E0B" stroke="#D97706" stroke-width="2.5"/>
  <ellipse cx="32" cy="32" rx="14" ry="11" fill="#FCD34D"/>
  <rect x="8"  y="8"  width="48" height="48" rx="6" fill="none" stroke="#B45309" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Top-right -->
  <rect x="64" y="8"  width="48" height="48" rx="6" fill="#F59E0B" stroke="#D97706" stroke-width="2.5"/>
  <ellipse cx="88" cy="32" rx="14" ry="11" fill="#FCD34D"/>
  <rect x="64" y="8"  width="48" height="48" rx="6" fill="none" stroke="#B45309" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom-left -->
  <rect x="8"  y="64" width="48" height="48" rx="6" fill="#F59E0B" stroke="#D97706" stroke-width="2.5"/>
  <ellipse cx="32" cy="88" rx="14" ry="11" fill="#FCD34D"/>
  <rect x="8"  y="64" width="48" height="48" rx="6" fill="none" stroke="#B45309" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Bottom-right -->
  <rect x="64" y="64" width="48" height="48" rx="6" fill="#F59E0B" stroke="#D97706" stroke-width="2.5"/>
  <ellipse cx="88" cy="88" rx="14" ry="11" fill="#FCD34D"/>
  <rect x="64" y="64" width="48" height="48" rx="6" fill="none" stroke="#B45309" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
