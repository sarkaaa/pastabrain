<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Cavatappi: hollow elbow tube in a corkscrew / double-helix form -->
  <!-- Two intertwining thick hollow tubes -->

  <!-- Back tube (darker) -->
  <path d="M35 10 C65 10 75 32 55 44 C35 56 25 78 55 90 C75 98 75 112 55 118"
        stroke="#D97706" stroke-width="14" stroke-linecap="round"/>
  <!-- Front tube (lighter) -->
  <path d="M85 10 C55 10 45 32 65 44 C85 56 95 78 65 90 C45 98 45 112 65 118"
        stroke="#F59E0B" stroke-width="14" stroke-linecap="round"/>
  <!-- Hollow channel on front tube -->
  <path d="M85 10 C55 10 45 32 65 44 C85 56 95 78 65 90 C45 98 45 112 65 118"
        stroke="#B45309" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <!-- Overlap: redraw front top and bottom over back -->
  <path d="M85 10 C55 10 45 32 65 44"
        stroke="#F59E0B" stroke-width="14" stroke-linecap="round"/>
  <path d="M85 10 C55 10 45 32 65 44"
        stroke="#B45309" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
  <path d="M65 90 C45 98 45 112 65 118"
        stroke="#F59E0B" stroke-width="14" stroke-linecap="round"/>
  <path d="M65 90 C45 98 45 112 65 118"
        stroke="#B45309" stroke-width="5" stroke-linecap="round" opacity="0.5"/>
</svg>
