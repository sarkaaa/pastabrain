  <rect x="32" y="0" width="25" height="120" rx="3" fill="#F59E0B"/>
  <rect x="62" y="0" width="25" height="120" rx="3" fill="#D97706"/>
  <rect x="92" y="0" width="25" height="120" rx="3" fill="#F59E0B"/>
  <!-- Wide highlight strips -->
  <rect x="4"  y="0" width="8" height="120" rx="2" fill="#FBBF24" opacity="0.4"/>
  <rect x="34" y="0" width="8" height="120" rx="2" fill="#FDE68A" opacity="0.4"/>
  <rect x="64" y="0" width="8" height="120" rx="2" fill="#FBBF24" opacity="0.4"/>
  <rect x="94" y="0" width="8" height="120" rx="2" fill="#FDE68A" opacity="0.4"/>
</svg>
