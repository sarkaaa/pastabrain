<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- Tagliatelle al nido — iconic pasta nest, top-down view -->
  <!-- Concentric ring layers show the tightly rolled ribbon pasta -->

  <!-- Outer layer (darkest — shadowed underside) -->
  <circle cx="60" cy="60" r="50" stroke="#92400E" stroke-width="13"/>

  <!-- Middle layer -->
  <circle cx="60" cy="60" r="34" stroke="#D97706" stroke-width="11"/>

  <!-- Inner layer (lightest — top surface catching the light) -->
  <circle cx="60" cy="60" r="20" stroke="#F59E0B" stroke-width="9"/>

  <!-- Centre dimple -->
  <circle cx="60" cy="60" r="9" fill="#D97706"/>
  <circle cx="60" cy="60" r="5" fill="#FBBF24"/>
</svg>
