<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <!-- Left penne tube -->
  <rect x="10" y="16" width="42" height="88" rx="12" fill="#F59E0B"/>
  <!-- Diagonal cut top (quill point) -->
  <path d="M10 31 L52 16 L52 24 L10 39Z" fill="#D97706"/>
  <!-- Diagonal cut bottom -->
  <path d="M10 89 L52 104 L52 96 L10 81Z" fill="#D97706"/>
  <!-- Hollow opening top -->
  <ellipse cx="31" cy="16" rx="12" ry="5" fill="#92400E" opacity="0.75"/>
  <!-- Hollow opening bottom -->
  <ellipse cx="31" cy="104" rx="12" ry="5" fill="#92400E" opacity="0.75"/>
  <!-- Inner channel -->
  <rect x="19" y="16" width="24" height="88" rx="7" fill="#92400E" opacity="0.12"/>
  <!-- Highlight -->
  <line x1="20" y1="20" x2="20" y2="100" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"/>

  <!-- Right penne tube -->
  <rect x="68" y="16" width="42" height="88" rx="12" fill="#F59E0B"/>
  <!-- Diagonal cut top -->
  <path d="M68 31 L110 16 L110 24 L68 39Z" fill="#D97706"/>
  <!-- Diagonal cut bottom -->
  <path d="M68 89 L110 104 L110 96 L68 81Z" fill="#D97706"/>
  <!-- Hollow opening top -->
  <ellipse cx="89" cy="16" rx="12" ry="5" fill="#92400E" opacity="0.75"/>
  <!-- Hollow opening bottom -->
  <ellipse cx="89" cy="104" rx="12" ry="5" fill="#92400E" opacity="0.75"/>
  <!-- Inner channel -->
  <rect x="77" y="16" width="24" height="88" rx="7" fill="#92400E" opacity="0.12"/>
  <!-- Highlight -->
  <line x1="78" y1="20" x2="78" y2="100" stroke="white" stroke-width="2" stroke-linecap="round" opacity="0.3"/>
</svg>
