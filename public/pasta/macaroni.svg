<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" fill="none">
  <!-- 4 macaroni elbows — curved hollow tubes in a 2×2 grid -->
  <!-- Three-layer stroke: outer body, lighter inner, dark center line shows hollow -->

  <!-- Top-left elbow -->
  <path d="M14 10 Q14 42 44 42" stroke="#D97706" stroke-width="18" stroke-linecap="round"/>
  <path d="M14 10 Q14 42 44 42" stroke="#F59E0B" stroke-width="9"  stroke-linecap="round"/>
  <path d="M14 10 Q14 42 44 42" stroke="#78350F" stroke-width="3"  stroke-linecap="round" opacity="0.5"/>

  <!-- Top-right elbow -->
  <path d="M76 10 Q76 42 106 42" stroke="#F59E0B" stroke-width="18" stroke-linecap="round"/>
  <path d="M76 10 Q76 42 106 42" stroke="#FDE68A" stroke-width="9"  stroke-linecap="round"/>
  <path d="M76 10 Q76 42 106 42" stroke="#92400E" stroke-width="3"  stroke-linecap="round" opacity="0.5"/>

  <!-- Bottom-left elbow -->
  <path d="M14 72 Q14 104 44 104" stroke="#F59E0B" stroke-width="18" stroke-linecap="round"/>
  <path d="M14 72 Q14 104 44 104" stroke="#FDE68A" stroke-width="9"  stroke-linecap="round"/>
  <path d="M14 72 Q14 104 44 104" stroke="#92400E" stroke-width="3"  stroke-linecap="round" opacity="0.5"/>

  <!-- Bottom-right elbow -->
  <path d="M76 72 Q76 104 106 104" stroke="#D97706" stroke-width="18" stroke-linecap="round"/>
  <path d="M76 72 Q76 104 106 104" stroke="#F59E0B" stroke-width="9"  stroke-linecap="round"/>
  <path d="M76 72 Q76 104 106 104" stroke="#78350F" stroke-width="3"  stroke-linecap="round" opacity="0.5"/>
</svg>
